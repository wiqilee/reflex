<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160">
  <style>
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .bob { animation: bob 2s ease-in-out infinite; }
  </style>
  <rect width="640" height="160" fill="#0a0a1a"/>
  <!-- SRE -->
  <g class="bob">
    <rect x="40" y="30" width="16" height="16" fill="#fbbf24" rx="2"/>
    <rect x="36" y="48" width="24" height="20" fill="#3b82f6"/>
    <text x="48" y="82" text-anchor="middle" font-family="monospace" font-size="7" fill="#3b82f6">SRE</text>
    <rect x="28" y="24" width="8" height="4" fill="#f97316"/><!-- Wrench -->
  </g>
  <!-- On-Call -->
  <g class="bob" style="animation-delay:0.3s">
    <rect x="140" y="30" width="16" height="16" fill="#fbbf24" rx="2"/>
    <rect x="136" y="48" width="24" height="20" fill="#22c55e"/>
    <text x="148" y="82" text-anchor="middle" font-family="monospace" font-size="7" fill="#22c55e">On-Call</text>
    <rect x="128" y="26" width="6" height="10" fill="#a855f7"/><!-- Phone -->
  </g>
  <!-- Manager -->
  <g class="bob" style="animation-delay:0.6s">
    <rect x="240" y="30" width="16" height="16" fill="#fbbf24" rx="2"/>
    <rect x="236" y="48" width="24" height="20" fill="#f97316"/>
    <text x="248" y="82" text-anchor="middle" font-family="monospace" font-size="7" fill="#f97316">Manager</text>
    <rect x="232" y="24" width="12" height="8" fill="#1e293b" rx="1"/><!-- Clipboard -->
  </g>
  <!-- Startup -->
  <g class="bob" style="animation-delay:0.9s">
    <rect x="360" y="30" width="16" height="16" fill="#fbbf24" rx="2"/>
    <rect x="356" y="48" width="24" height="20" fill="#ec4899"/>
    <text x="368" y="82" text-anchor="middle" font-family="monospace" font-size="7" fill="#ec4899">Startup</text>
    <text x="368" y="24" font-size="12">🚀</text>
  </g>
  <!-- Student -->
  <g class="bob" style="animation-delay:1.2s">
    <rect x="470" y="30" width="16" height="16" fill="#fbbf24" rx="2"/>
    <rect x="466" y="48" width="24" height="20" fill="#a855f7"/>
    <text x="478" y="82" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">Student</text>
    <text x="478" y="24" font-size="12">🎓</text>
  </g>
  <!-- Global -->
  <g class="bob" style="animation-delay:1.5s">
    <rect x="580" y="30" width="16" height="16" fill="#fbbf24" rx="2"/>
    <rect x="576" y="48" width="24" height="20" fill="#2dd4bf"/>
    <text x="588" y="82" text-anchor="middle" font-family="monospace" font-size="7" fill="#2dd4bf">Global</text>
    <text x="588" y="24" font-size="12">🌍</text>
  </g>
  <!-- Divider and tagline -->
  <rect x="40" y="100" width="560" height="1" fill="#374151" opacity="0.3"/>
  <text x="320" y="124" text-anchor="middle" font-family="monospace" font-size="10" fill="#f97316">Everyone deserves good runbooks</text>
  <rect x="0" y="148" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>