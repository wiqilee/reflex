<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200">
  <style>
    @keyframes twinkle { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes bolt { 0%,85% { opacity: 0; } 90% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes blink { 0%,48%,52%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes scroll { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }
    .star { animation: twinkle 2s ease-in-out infinite; }
    .bolt { animation: bolt 4s ease-in-out infinite; }
    .floaty { animation: float 3s ease-in-out infinite; }
    .glow { animation: pulse 2s ease-in-out infinite; }
    .cursor { animation: blink 1s step-end infinite; }
    .code-scroll { animation: scroll 3s linear infinite; }
  </style>
  <rect width="640" height="200" fill="#0a0a1a"/>
  <!-- Stars -->
  <rect x="50" y="15" width="4" height="4" fill="#fbbf24" class="star"/>
  <rect x="150" y="25" width="4" height="4" fill="#fbbf24" class="star" style="animation-delay:0.5s"/>
  <rect x="280" y="10" width="4" height="4" fill="#fbbf24" class="star" style="animation-delay:1s"/>
  <rect x="420" y="20" width="4" height="4" fill="#fbbf24" class="star" style="animation-delay:1.5s"/>
  <rect x="550" y="12" width="4" height="4" fill="#fbbf24" class="star" style="animation-delay:0.3s"/>
  <rect x="100" y="35" width="3" height="3" fill="#64748b" class="star" style="animation-delay:0.8s"/>
  <rect x="350" y="30" width="3" height="3" fill="#64748b" class="star" style="animation-delay:1.2s"/>
  <rect x="500" y="35" width="3" height="3" fill="#64748b" class="star" style="animation-delay:0.6s"/>
  <!-- Lightning bolt -->
  <g class="bolt">
    <rect x="310" y="5" width="8" height="16" fill="#f97316"/>
    <rect x="306" y="21" width="8" height="12" fill="#f97316"/>
    <rect x="314" y="21" width="8" height="8" fill="#fbbf24"/>
    <rect x="302" y="33" width="8" height="16" fill="#f97316"/>
    <rect x="310" y="33" width="4" height="8" fill="#fbbf24"/>
  </g>
  <g class="bolt" style="animation-delay:2s">
    <rect x="180" y="10" width="6" height="12" fill="#f97316" opacity="0.6"/>
    <rect x="176" y="22" width="6" height="10" fill="#f97316" opacity="0.6"/>
  </g>
  <!-- City skyline -->
  <rect x="0" y="140" width="640" height="60" fill="#111827"/>
  <rect x="40" y="100" width="40" height="100" fill="#1e293b"/>
  <rect x="48" y="108" width="8" height="8" fill="#fbbf24" opacity="0.6"/>
  <rect x="64" y="108" width="8" height="8" fill="#3b82f6" opacity="0.4"/>
  <rect x="48" y="124" width="8" height="8" fill="#22c55e" opacity="0.3"/>
  <rect x="100" y="80" width="50" height="120" fill="#1e293b"/>
  <rect x="108" y="88" width="8" height="8" fill="#f97316" opacity="0.5"/>
  <rect x="124" y="88" width="8" height="8" fill="#fbbf24" opacity="0.4"/>
  <rect x="108" y="104" width="8" height="8" fill="#3b82f6" opacity="0.6"/>
  <rect x="124" y="120" width="8" height="8" fill="#22c55e" opacity="0.5"/>
  <rect x="170" y="110" width="35" height="90" fill="#1e293b"/>
  <rect x="178" y="118" width="6" height="6" fill="#fbbf24" opacity="0.5"/>
  <rect x="230" y="90" width="45" height="110" fill="#1e293b"/>
  <rect x="238" y="98" width="8" height="8" fill="#ef4444" opacity="0.4"/>
  <rect x="254" y="98" width="8" height="8" fill="#fbbf24" opacity="0.6"/>
  <rect x="238" y="114" width="8" height="8" fill="#3b82f6" opacity="0.5"/>
  <!-- SRE Person at desk (center-right) -->
  <g class="floaty" style="animation-delay:0.5s">
    <!-- Desk -->
    <rect x="380" y="148" width="80" height="8" fill="#92400e"/>
    <rect x="388" y="156" width="8" height="24" fill="#78350f"/>
    <rect x="444" y="156" width="8" height="24" fill="#78350f"/>
    <!-- Monitor -->
    <rect x="396" y="120" width="48" height="32" fill="#1e293b" stroke="#374151" stroke-width="2"/>
    <rect x="400" y="124" width="40" height="24" fill="#0f172a"/>
    <!-- Code on screen -->
    <rect x="404" y="128" width="20" height="3" fill="#22c55e" opacity="0.8"/>
    <rect x="404" y="134" width="16" height="3" fill="#f97316" opacity="0.8"/>
    <rect x="404" y="140" width="24" height="3" fill="#3b82f6" opacity="0.8"/>
    <rect x="432" y="128" width="4" height="3" fill="#22c55e" class="cursor"/>
    <!-- Monitor stand -->
    <rect x="416" y="152" width="8" height="4" fill="#374151"/>
    <!-- Person -->
    <rect x="356" y="124" width="16" height="16" fill="#fbbf24"/><!-- Head -->
    <rect x="360" y="130" width="4" height="4" fill="#0a0a1a"/><!-- Eye -->
    <rect x="368" y="130" width="4" height="4" fill="#0a0a1a"/><!-- Eye -->
    <rect x="354" y="140" width="20" height="20" fill="#3b82f6"/><!-- Body -->
    <rect x="346" y="144" width="8" height="4" fill="#3b82f6"/><!-- Left arm -->
    <rect x="374" y="144" width="12" height="4" fill="#3b82f6"/><!-- Right arm to keyboard -->
    <!-- Coffee mug -->
    <rect x="462" y="140" width="12" height="12" fill="#78350f"/>
    <rect x="474" y="144" width="4" height="4" fill="#78350f"/>
  </g>
  <!-- Floating runbook pages -->
  <g class="floaty" style="animation-delay:1s">
    <rect x="510" y="80" width="36" height="44" fill="#1e293b" rx="2"/>
    <rect x="514" y="86" width="20" height="3" fill="#ef4444" opacity="0.6"/>
    <rect x="514" y="92" width="16" height="3" fill="#f97316" opacity="0.6"/>
    <rect x="514" y="98" width="24" height="3" fill="#22c55e" opacity="0.6"/>
    <rect x="514" y="104" width="12" height="3" fill="#3b82f6" opacity="0.6"/>
    <rect x="514" y="110" width="18" height="3" fill="#a855f7" opacity="0.6"/>
  </g>
  <g class="floaty" style="animation-delay:1.8s">
    <rect x="560" y="100" width="32" height="40" fill="#1e293b" rx="2"/>
    <rect x="564" y="106" width="18" height="3" fill="#22c55e" opacity="0.6"/>
    <rect x="564" y="112" width="22" height="3" fill="#22c55e" opacity="0.6"/>
    <rect x="564" y="118" width="14" height="3" fill="#22c55e" opacity="0.6"/>
    <rect x="564" y="124" width="20" height="3" fill="#22c55e" opacity="0.6"/>
  </g>
  <!-- REFLEX text glow -->
  <text x="320" y="75" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#f97316" class="glow">⚡ REFLEX</text>
  <!-- Ground -->
  <rect x="0" y="180" width="640" height="4" fill="#22c55e" opacity="0.3"/>
  <rect x="0" y="184" width="640" height="16" fill="#064e3b" opacity="0.3"/>
  <!-- Trees -->
  <rect x="308" y="168" width="8" height="16" fill="#78350f"/>
  <rect x="300" y="156" width="24" height="16" fill="#22c55e" opacity="0.7"/>
  <rect x="304" y="148" width="16" height="12" fill="#22c55e" opacity="0.5"/>
  <rect x="580" y="170" width="6" height="14" fill="#78350f"/>
  <rect x="574" y="160" width="18" height="14" fill="#22c55e" opacity="0.6"/>
</svg>
