<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 100">
  <style>
    @keyframes merge { 0% { opacity: 0; transform: translateX(-10px); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateX(10px); } }
    .merge { animation: merge 2s ease-in-out infinite; }
  </style>
  <rect width="640" height="100" fill="#0a0a1a"/>
  <!-- Git branch visualization -->
  <line x1="100" y1="40" x2="540" y2="40" stroke="#374151" stroke-width="3"/>
  <circle cx="160" cy="40" r="8" fill="#22c55e" stroke="#1e293b" stroke-width="2"/>
  <circle cx="280" cy="40" r="8" fill="#3b82f6" stroke="#1e293b" stroke-width="2"/>
  <circle cx="400" cy="40" r="8" fill="#a855f7" stroke="#1e293b" stroke-width="2"/>
  <circle cx="520" cy="40" r="8" fill="#f97316" stroke="#1e293b" stroke-width="2"/>
  <!-- Branch -->
  <line x1="280" y1="40" x2="340" y2="20" stroke="#ec4899" stroke-width="2"/>
  <line x1="340" y1="20" x2="400" y2="40" stroke="#ec4899" stroke-width="2"/>
  <circle cx="340" cy="20" r="6" fill="#ec4899" stroke="#1e293b" stroke-width="2"/>
  <!-- PR merge particles -->
  <rect x="350" y="28" width="4" height="4" fill="#22c55e" class="merge"/>
  <rect x="360" y="24" width="4" height="4" fill="#fbbf24" class="merge" style="animation-delay:0.5s"/>
  <!-- Labels -->
  <text x="160" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#22c55e">issue</text>
  <text x="280" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#3b82f6">fork</text>
  <text x="340" y="14" text-anchor="middle" font-family="monospace" font-size="7" fill="#ec4899">PR</text>
  <text x="400" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">review</text>
  <text x="520" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#f97316">merge!</text>
  <text x="320" y="82" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">Open an issue first · PRs welcome · MIT License</text>
  <rect x="0" y="92" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>