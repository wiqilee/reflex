<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
  <style>
    @keyframes ping { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    .ping { animation: ping 1.5s ease-in-out infinite; }
  </style>
  <rect width="640" height="120" fill="#0a0a1a"/>
  <!-- API endpoints visualization -->
  <rect x="40" y="14" width="100" height="28" fill="#1e293b" rx="4"/>
  <text x="56" y="32" font-family="monospace" font-size="7" fill="#22c55e" class="ping">GET</text>
  <text x="82" y="32" font-family="monospace" font-size="7" fill="#64748b">/health</text>
  <rect x="156" y="14" width="140" height="28" fill="#1e293b" rx="4"/>
  <text x="168" y="32" font-family="monospace" font-size="7" fill="#f97316" class="ping" style="animation-delay:0.3s">POST</text>
  <text x="198" y="32" font-family="monospace" font-size="7" fill="#64748b">/api/v1/analyze</text>
  <rect x="312" y="14" width="160" height="28" fill="#1e293b" rx="4"/>
  <text x="324" y="32" font-family="monospace" font-size="7" fill="#f97316" class="ping" style="animation-delay:0.6s">POST</text>
  <text x="354" y="32" font-family="monospace" font-size="7" fill="#64748b">/api/v1/analyze/multi</text>
  <rect x="488" y="14" width="120" height="28" fill="#1e293b" rx="4"/>
  <text x="500" y="32" font-family="monospace" font-size="7" fill="#3b82f6" class="ping" style="animation-delay:0.9s">POST</text>
  <text x="530" y="32" font-family="monospace" font-size="7" fill="#64748b">/api/v1/export</text>
  <!-- Second row -->
  <rect x="40" y="52" width="100" height="28" fill="#1e293b" rx="4"/>
  <text x="56" y="70" font-family="monospace" font-size="7" fill="#22c55e" class="ping" style="animation-delay:0.2s">GET</text>
  <text x="82" y="70" font-family="monospace" font-size="7" fill="#64748b">/api/v1/demo</text>
  <rect x="156" y="52" width="140" height="28" fill="#1e293b" rx="4"/>
  <text x="168" y="70" font-family="monospace" font-size="7" fill="#a855f7" class="ping" style="animation-delay:0.5s">POST</text>
  <text x="198" y="70" font-family="monospace" font-size="7" fill="#64748b">/api/v1/translate</text>
  <rect x="312" y="52" width="160" height="28" fill="#1e293b" rx="4"/>
  <text x="324" y="70" font-family="monospace" font-size="7" fill="#ec4899" class="ping" style="animation-delay:0.8s">POST</text>
  <text x="354" y="70" font-family="monospace" font-size="7" fill="#64748b">/api/v1/runbook/{id}</text>
  <rect x="488" y="52" width="120" height="28" fill="#1e293b" rx="4"/>
  <text x="500" y="70" font-family="monospace" font-size="7" fill="#22c55e" class="ping" style="animation-delay:1.1s">GET</text>
  <text x="530" y="70" font-family="monospace" font-size="7" fill="#64748b">/api/v1/languages</text>
  <!-- Swagger badge -->
  <rect x="240" y="88" width="160" height="20" fill="#1e293b" rx="10" stroke="#22c55e" stroke-width="1"/>
  <text x="320" y="102" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">📖 Swagger UI at /docs</text>
  <rect x="0" y="114" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>