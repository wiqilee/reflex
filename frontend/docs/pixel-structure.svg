<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
  <style>
    @keyframes highlight { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .hl { animation: highlight 2s ease-in-out infinite; }
  </style>
  <rect width="640" height="120" fill="#0a0a1a"/>
  <!-- Folder tree -->
  <text x="40" y="22" font-family="monospace" font-size="9" fill="#f97316" font-weight="bold">reflex/</text>
  <text x="60" y="36" font-family="monospace" font-size="8" fill="#3b82f6" class="hl">├── backend/</text>
  <text x="160" y="36" font-family="monospace" font-size="7" fill="#64748b">FastAPI + Mistral</text>
  <text x="60" y="50" font-family="monospace" font-size="8" fill="#ef4444" class="hl" style="animation-delay:0.3s">├── engine/</text>
  <text x="160" y="50" font-family="monospace" font-size="7" fill="#64748b">Rust WASM</text>
  <text x="60" y="64" font-family="monospace" font-size="8" fill="#22c55e" class="hl" style="animation-delay:0.6s">├── frontend/</text>
  <text x="160" y="64" font-family="monospace" font-size="7" fill="#64748b">React + Tailwind</text>
  <text x="60" y="78" font-family="monospace" font-size="8" fill="#a855f7" class="hl" style="animation-delay:0.9s">├── tests/</text>
  <text x="160" y="78" font-family="monospace" font-size="7" fill="#64748b">pytest</text>
  <text x="60" y="92" font-family="monospace" font-size="8" fill="#fbbf24" class="hl" style="animation-delay:1.2s">└── docs/</text>
  <text x="160" y="92" font-family="monospace" font-size="7" fill="#64748b">Pixel art SVGs</text>
  <!-- File count badges -->
  <rect x="360" y="20" width="100" height="24" fill="#1e293b" rx="4"/>
  <text x="410" y="36" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6">5 backend files</text>
  <rect x="480" y="20" width="100" height="24" fill="#1e293b" rx="4"/>
  <text x="530" y="36" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">1 Rust lib</text>
  <rect x="360" y="52" width="100" height="24" fill="#1e293b" rx="4"/>
  <text x="410" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">12+ components</text>
  <rect x="480" y="52" width="100" height="24" fill="#1e293b" rx="4"/>
  <text x="530" y="68" text-anchor="middle" font-family="monospace" font-size="8" fill="#fbbf24">17 SVG arts</text>
  <rect x="0" y="112" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>