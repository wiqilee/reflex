<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
  <style>
    @keyframes code-type { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes heart-beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    .code { animation: code-type 1.5s ease-in-out infinite; }
    .heart { animation: heart-beat 1s ease-in-out infinite; }
  </style>
  <rect width="640" height="120" fill="#0a0a1a"/>
  <!-- Developer pixel avatar -->
  <rect x="260" y="12" width="24" height="24" fill="#fbbf24" rx="4"/>
  <rect x="264" y="20" width="4" height="4" fill="#0a0a1a"/>
  <rect x="276" y="20" width="4" height="4" fill="#0a0a1a"/>
  <rect x="268" y="28" width="8" height="3" fill="#f97316"/>
  <rect x="256" y="38" width="32" height="28" fill="#3b82f6"/>
  <!-- Laptop -->
  <rect x="296" y="30" width="48" height="32" fill="#1e293b" rx="2"/>
  <rect x="300" y="34" width="40" height="24" fill="#0f172a"/>
  <rect x="304" y="38" width="20" height="3" fill="#22c55e" opacity="0.7" class="code"/>
  <rect x="304" y="44" width="28" height="3" fill="#f97316" opacity="0.7" class="code" style="animation-delay:0.3s"/>
  <rect x="304" y="50" width="16" height="3" fill="#3b82f6" opacity="0.7" class="code" style="animation-delay:0.6s"/>
  <rect x="292" y="62" width="56" height="4" fill="#374151" rx="1"/>
  <!-- Arms typing -->
  <rect x="286" y="48" width="10" height="4" fill="#3b82f6"/>
  <rect x="344" y="48" width="10" height="4" fill="#3b82f6"/>
  <!-- Heart -->
  <text x="360" y="28" font-size="16" class="heart">❤️</text>
  <!-- Name and links -->
  <text x="320" y="86" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#f97316">Wiqi Lee</text>
  <text x="200" y="104" font-family="monospace" font-size="8" fill="#3b82f6">🐦 @wiqi_lee</text>
  <text x="320" y="104" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">💻 github.com/wiqilee</text>
  <text x="460" y="104" font-family="monospace" font-size="8" fill="#a855f7">💬 wiqi_lee</text>
  <rect x="0" y="112" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>