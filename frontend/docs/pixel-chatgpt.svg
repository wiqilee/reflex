<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160">
  <style>
    @keyframes xmark { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes check { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
    .xm { animation: xmark 2s ease-in-out infinite; }
    .ck { animation: check 2s ease-in-out infinite; }
  </style>
  <rect width="640" height="160" fill="#0a0a1a"/>
  <!-- ChatGPT side -->
  <rect x="40" y="16" width="240" height="120" fill="#1e293b" rx="6"/>
  <text x="160" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">ChatGPT</text>
  <rect x="56" y="50" width="80" height="4" fill="#374151"/>
  <rect x="56" y="58" width="100" height="4" fill="#374151"/>
  <rect x="56" y="66" width="60" height="4" fill="#374151"/>
  <rect x="56" y="74" width="90" height="4" fill="#374151"/>
  <rect x="56" y="82" width="70" height="4" fill="#374151"/>
  <rect x="56" y="90" width="110" height="4" fill="#374151"/>
  <text x="240" y="58" font-family="monospace" font-size="12" fill="#ef4444" class="xm">✗</text>
  <text x="240" y="74" font-family="monospace" font-size="12" fill="#ef4444" class="xm" style="animation-delay:0.3s">✗</text>
  <text x="240" y="90" font-family="monospace" font-size="12" fill="#ef4444" class="xm" style="animation-delay:0.6s">✗</text>
  <text x="160" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#64748b">Free-form text output</text>
  <!-- VS -->
  <text x="320" y="82" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#f97316">VS</text>
  <!-- REFLEX side -->
  <rect x="360" y="16" width="240" height="120" fill="#1e293b" rx="6" stroke="#f97316" stroke-width="1" opacity="0.8"/>
  <text x="480" y="40" text-anchor="middle" font-family="monospace" font-size="11" fill="#f97316" font-weight="bold">⚡ REFLEX</text>
  <rect x="376" y="50" width="40" height="4" fill="#ef4444" opacity="0.6"/>
  <rect x="420" y="50" width="60" height="4" fill="#22c55e" opacity="0.6"/>
  <rect x="376" y="58" width="32" height="4" fill="#f97316" opacity="0.6"/>
  <rect x="412" y="58" width="80" height="4" fill="#22c55e" opacity="0.6"/>
  <rect x="376" y="66" width="48" height="4" fill="#fbbf24" opacity="0.6"/>
  <rect x="428" y="66" width="52" height="4" fill="#22c55e" opacity="0.6"/>
  <rect x="376" y="74" width="28" height="4" fill="#3b82f6" opacity="0.6"/>
  <rect x="408" y="74" width="72" height="4" fill="#22c55e" opacity="0.6"/>
  <rect x="376" y="82" width="56" height="4" fill="#a855f7" opacity="0.6"/>
  <rect x="436" y="82" width="44" height="4" fill="#22c55e" opacity="0.6"/>
  <rect x="376" y="90" width="36" height="4" fill="#ec4899" opacity="0.6"/>
  <rect x="416" y="90" width="64" height="4" fill="#22c55e" opacity="0.6"/>
  <text x="560" y="58" font-family="monospace" font-size="12" fill="#22c55e" class="ck">✓</text>
  <text x="560" y="74" font-family="monospace" font-size="12" fill="#22c55e" class="ck" style="animation-delay:0.3s">✓</text>
  <text x="560" y="90" font-family="monospace" font-size="12" fill="#22c55e" class="ck" style="animation-delay:0.6s">✓</text>
  <text x="480" y="118" text-anchor="middle" font-family="monospace" font-size="7" fill="#f97316">Structured 5-phase runbooks</text>
  <!-- Stars -->
  <rect x="20" y="8" width="3" height="3" fill="#fbbf24" opacity="0.5"/>
  <rect x="320" y="4" width="3" height="3" fill="#fbbf24" opacity="0.5"/>
  <rect x="620" y="10" width="3" height="3" fill="#fbbf24" opacity="0.5"/>
  <rect x="0" y="148" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>