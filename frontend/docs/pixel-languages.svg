<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 100">
  <style>
    @keyframes wave { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    .wave { animation: wave 1.5s ease-in-out infinite; }
  </style>
  <rect width="640" height="100" fill="#0a0a1a"/>
  <!-- Flags row -->
  <text x="32" y="36" font-size="16" class="wave">🇬🇧</text>
  <text x="64" y="36" font-size="16" class="wave" style="animation-delay:0.1s">🇫🇷</text>
  <text x="96" y="36" font-size="16" class="wave" style="animation-delay:0.2s">🇩🇪</text>
  <text x="128" y="36" font-size="16" class="wave" style="animation-delay:0.3s">🇪🇸</text>
  <text x="160" y="36" font-size="16" class="wave" style="animation-delay:0.4s">🇧🇷</text>
  <text x="192" y="36" font-size="16" class="wave" style="animation-delay:0.5s">🇮🇹</text>
  <text x="224" y="36" font-size="16" class="wave" style="animation-delay:0.6s">🇳🇱</text>
  <text x="256" y="36" font-size="16" class="wave" style="animation-delay:0.7s">🇷🇺</text>
  <text x="288" y="36" font-size="16" class="wave" style="animation-delay:0.8s">🇨🇳</text>
  <text x="320" y="36" font-size="16" class="wave" style="animation-delay:0.9s">🇹🇼</text>
  <text x="352" y="36" font-size="16" class="wave" style="animation-delay:1.0s">🇯🇵</text>
  <text x="384" y="36" font-size="16" class="wave" style="animation-delay:1.1s">🇰🇷</text>
  <text x="416" y="36" font-size="16" class="wave" style="animation-delay:1.2s">🇸🇦</text>
  <text x="448" y="36" font-size="16" class="wave" style="animation-delay:1.3s">🇮🇳</text>
  <text x="480" y="36" font-size="16" class="wave" style="animation-delay:1.4s">🇹🇷</text>
  <text x="512" y="36" font-size="16" class="wave" style="animation-delay:1.5s">🇵🇱</text>
  <text x="544" y="36" font-size="16" class="wave" style="animation-delay:1.6s">🇮🇩</text>
  <text x="576" y="36" font-size="16" class="wave" style="animation-delay:1.7s">🇻🇳</text>
  <!-- Code languages -->
  <text x="100" y="64" font-family="monospace" font-size="8" fill="#22c55e">Python</text>
  <text x="170" y="64" font-family="monospace" font-size="8" fill="#60a5fa">Go</text>
  <text x="220" y="64" font-family="monospace" font-size="8" fill="#ef4444">Rust</text>
  <text x="290" y="64" font-family="monospace" font-size="8" fill="#f97316">Java</text>
  <text x="360" y="64" font-family="monospace" font-size="8" fill="#3b82f6">TypeScript</text>
  <text x="470" y="64" font-family="monospace" font-size="8" fill="#fbbf24">YAML</text>
  <text x="320" y="82" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">18 languages · 6 demo samples · Technical terms preserved</text>
  <rect x="0" y="92" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>