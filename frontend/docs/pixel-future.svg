<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
  <style>
    @keyframes rocket { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0); } }
    @keyframes spark { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
    .rocket { animation: rocket 2s ease-in-out infinite; }
    .spark { animation: spark 1s ease-in-out infinite; }
  </style>
  <rect width="640" height="120" fill="#0a0a1a"/>
  <!-- Rocket -->
  <g class="rocket">
    <rect x="36" y="20" width="16" height="32" fill="#ef4444" rx="4"/>
    <rect x="32" y="44" width="24" height="8" fill="#f97316"/>
    <rect x="40" y="52" width="8" height="8" fill="#fbbf24" class="spark"/>
    <rect x="38" y="58" width="4" height="6" fill="#fbbf24" class="spark" style="animation-delay:0.3s"/>
    <rect x="46" y="56" width="4" height="6" fill="#f97316" class="spark" style="animation-delay:0.5s"/>
  </g>
  <!-- Future roadmap items -->
  <rect x="80" y="14" width="160" height="28" fill="#1e293b" rx="4"/>
  <text x="160" y="32" text-anchor="middle" font-family="monospace" font-size="7" fill="#3b82f6">🔧 CI/CD Integration</text>
  <rect x="260" y="14" width="160" height="28" fill="#1e293b" rx="4"/>
  <text x="340" y="32" text-anchor="middle" font-family="monospace" font-size="7" fill="#22c55e">🌳 AST-Aware Analysis</text>
  <rect x="440" y="14" width="160" height="28" fill="#1e293b" rx="4"/>
  <text x="520" y="32" text-anchor="middle" font-family="monospace" font-size="7" fill="#a855f7">☸ Terraform / K8s</text>
  <rect x="80" y="52" width="160" height="28" fill="#1e293b" rx="4"/>
  <text x="160" y="70" text-anchor="middle" font-family="monospace" font-size="7" fill="#ec4899">📟 PagerDuty Export</text>
  <rect x="260" y="52" width="160" height="28" fill="#1e293b" rx="4"/>
  <text x="340" y="70" text-anchor="middle" font-family="monospace" font-size="7" fill="#f97316">💻 VS Code Extension</text>
  <!-- Stars -->
  <text x="320" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24">The future is bright ⭐</text>
  <rect x="0" y="112" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>