<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 120">
  <style>
    @keyframes type { 0% { width: 0; } 100% { width: 120px; } }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    .blink { animation: blink 1s step-end infinite; }
  </style>
  <rect width="640" height="120" fill="#0a0a1a"/>
  <!-- Terminal window -->
  <rect x="80" y="10" width="480" height="90" fill="#0f172a" rx="6" stroke="#374151" stroke-width="1"/>
  <circle cx="96" cy="22" r="4" fill="#ef4444"/>
  <circle cx="108" cy="22" r="4" fill="#fbbf24"/>
  <circle cx="120" cy="22" r="4" fill="#22c55e"/>
  <text x="100" y="42" font-family="monospace" font-size="8" fill="#22c55e">$ git clone https://github.com/wiqilee/reflex.git</text>
  <text x="100" y="54" font-family="monospace" font-size="8" fill="#22c55e">$ cd reflex &amp;&amp; pip install -r requirements.txt</text>
  <text x="100" y="66" font-family="monospace" font-size="8" fill="#f97316">$ uvicorn backend.main:app --reload</text>
  <text x="100" y="78" font-family="monospace" font-size="8" fill="#3b82f6">$ cd frontend &amp;&amp; npm run dev</text>
  <rect x="336" y="74" width="6" height="8" fill="#22c55e" class="blink"/>
  <text x="100" y="90" font-family="monospace" font-size="7" fill="#64748b">Ready at http://localhost:5173</text>
  <rect x="0" y="112" width="640" height="4" fill="#374151" opacity="0.2"/>
</svg>