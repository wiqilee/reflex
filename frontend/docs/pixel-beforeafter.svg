<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180">
  <style>
    @keyframes sweat { 0%,100% { opacity: 0; transform: translateY(0); } 30% { opacity: 1; } 100% { transform: translateY(8px); } }
    @keyframes celebrate { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes heart { 0% { opacity: 0; transform: translateY(0); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateY(-16px); } }
    @keyframes sparkle { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
    @keyframes arrow-flow { 0% { opacity: 0; transform: translateX(-10px); } 50% { opacity: 1; } 100% { opacity: 0; transform: translateX(10px); } }
    .sweat { animation: sweat 2s ease-in-out infinite; }
    .happy { animation: celebrate 1.5s ease-in-out infinite; }
    .heart { animation: heart 2s ease-in-out infinite; }
    .spark { animation: sparkle 1.5s ease-in-out infinite; }
    .flow { animation: arrow-flow 1.5s ease-in-out infinite; }
  </style>
  <rect width="640" height="180" fill="#0a0a1a"/>
  <!-- BEFORE side -->
  <text x="140" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ef4444">BEFORE</text>
  <!-- Worried person -->
  <rect x="80" y="40" width="20" height="20" fill="#fbbf24" rx="2"/><!-- Head -->
  <rect x="84" y="48" width="4" height="4" fill="#0a0a1a"/>
  <rect x="92" y="48" width="4" height="4" fill="#0a0a1a"/>
  <rect x="86" y="56" width="8" height="3" fill="#ef4444"/><!-- Frown -->
  <rect x="76" y="62" width="28" height="28" fill="#3b82f6"/><!-- Body -->
  <rect x="68" y="66" width="8" height="4" fill="#3b82f6"/><!-- Arm -->
  <rect x="104" y="66" width="8" height="4" fill="#3b82f6"/>
  <!-- Sweat drops -->
  <rect x="104" y="38" width="4" height="6" fill="#60a5fa" class="sweat"/>
  <rect x="110" y="42" width="4" height="6" fill="#60a5fa" class="sweat" style="animation-delay:0.5s"/>
  <!-- Red document with X marks -->
  <rect x="140" y="36" width="60" height="72" fill="#1e293b" rx="3"/>
  <rect x="148" y="44" width="32" height="4" fill="#ef4444" opacity="0.6"/>
  <rect x="148" y="52" width="24" height="4" fill="#ef4444" opacity="0.4"/>
  <rect x="148" y="60" width="36" height="4" fill="#ef4444" opacity="0.6"/>
  <rect x="148" y="68" width="20" height="4" fill="#ef4444" opacity="0.4"/>
  <rect x="148" y="76" width="28" height="4" fill="#ef4444" opacity="0.6"/>
  <rect x="148" y="84" width="16" height="4" fill="#ef4444" opacity="0.4"/>
  <!-- X marks -->
  <rect x="188" y="44" width="6" height="6" fill="#ef4444"/>
  <rect x="188" y="60" width="6" height="6" fill="#ef4444"/>
  <rect x="188" y="76" width="6" height="6" fill="#ef4444"/>
  <!-- Warning signs -->
  <rect x="60" y="100" width="36" height="24" fill="#7f1d1d" rx="2"/>
  <text x="78" y="116" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">⚠️</text>
  <rect x="120" y="120" width="80" height="16" fill="#7f1d1d" rx="2"/>
  <text x="160" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">STALE RUNBOOK</text>
  <!-- CENTER arrow -->
  <g>
    <rect x="268" y="72" width="8" height="8" fill="#f97316" class="flow"/>
    <rect x="284" y="72" width="8" height="8" fill="#fbbf24" class="flow" style="animation-delay:0.3s"/>
    <rect x="300" y="72" width="8" height="8" fill="#22c55e" class="flow" style="animation-delay:0.6s"/>
    <rect x="316" y="72" width="8" height="8" fill="#3b82f6" class="flow" style="animation-delay:0.9s"/>
    <rect x="332" y="72" width="8" height="8" fill="#a855f7" class="flow" style="animation-delay:1.2s"/>
    <rect x="348" y="68" width="4" height="4" fill="#fbbf24" class="spark"/>
    <rect x="348" y="80" width="4" height="4" fill="#fbbf24" class="spark" style="animation-delay:0.5s"/>
    <rect x="352" y="72" width="12" height="8" fill="#22c55e"/>
    <rect x="360" y="68" width="4" height="4" fill="#22c55e"/>
    <rect x="360" y="80" width="4" height="4" fill="#22c55e"/>
  </g>
  <text x="320" y="62" text-anchor="middle" font-family="monospace" font-size="10" fill="#f97316" class="spark">⚡ REFLEX</text>
  <!-- AFTER side -->
  <text x="500" y="20" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#22c55e">AFTER</text>
  <!-- Happy person -->
  <g class="happy">
    <rect x="440" y="40" width="20" height="20" fill="#fbbf24" rx="2"/>
    <rect x="444" y="48" width="4" height="4" fill="#0a0a1a"/>
    <rect x="452" y="48" width="4" height="4" fill="#0a0a1a"/>
    <rect x="446" y="56" width="8" height="3" fill="#22c55e"/><!-- Smile -->
    <rect x="436" y="62" width="28" height="28" fill="#22c55e"/>
    <rect x="428" y="60" width="8" height="4" fill="#22c55e"/><!-- Arms up -->
    <rect x="428" y="54" width="4" height="6" fill="#fbbf24"/>
    <rect x="464" y="60" width="8" height="4" fill="#22c55e"/>
    <rect x="472" y="54" width="4" height="6" fill="#fbbf24"/>
  </g>
  <!-- Hearts -->
  <rect x="470" y="36" width="6" height="4" fill="#ec4899" class="heart"/>
  <rect x="480" y="30" width="6" height="4" fill="#ec4899" class="heart" style="animation-delay:0.7s"/>
  <!-- Green document with checkmarks -->
  <rect x="500" y="36" width="60" height="72" fill="#1e293b" rx="3"/>
  <rect x="508" y="44" width="32" height="4" fill="#22c55e" opacity="0.7"/>
  <rect x="508" y="52" width="24" height="4" fill="#22c55e" opacity="0.5"/>
  <rect x="508" y="60" width="36" height="4" fill="#22c55e" opacity="0.7"/>
  <rect x="508" y="68" width="20" height="4" fill="#22c55e" opacity="0.5"/>
  <rect x="508" y="76" width="28" height="4" fill="#22c55e" opacity="0.7"/>
  <rect x="508" y="84" width="16" height="4" fill="#22c55e" opacity="0.5"/>
  <!-- Checkmarks -->
  <rect x="548" y="44" width="6" height="6" fill="#22c55e"/>
  <rect x="548" y="60" width="6" height="6" fill="#22c55e"/>
  <rect x="548" y="76" width="6" height="6" fill="#22c55e"/>
  <!-- Success badge -->
  <rect x="490" y="120" width="80" height="16" fill="#064e3b" rx="2"/>
  <text x="530" y="132" text-anchor="middle" font-family="monospace" font-size="8" fill="#22c55e">✅ PRODUCTION READY</text>
  <!-- Ground -->
  <rect x="0" y="160" width="640" height="4" fill="#374151" opacity="0.3"/>
  <!-- Stars -->
  <rect x="30" y="12" width="3" height="3" fill="#fbbf24" class="spark" style="animation-delay:0.2s"/>
  <rect x="240" y="8" width="3" height="3" fill="#fbbf24" class="spark" style="animation-delay:0.8s"/>
  <rect x="610" y="14" width="3" height="3" fill="#fbbf24" class="spark" style="animation-delay:1.4s"/>
</svg>
