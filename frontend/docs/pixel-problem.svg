<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180">
  <style>
    @keyframes alarm { 0%,100% { fill: #ef4444; } 50% { fill: #7f1d1d; } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
    @keyframes ring { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    .alarm { animation: alarm 0.5s ease-in-out infinite; }
    .shake { animation: shake 0.3s ease-in-out infinite; }
    .ring { animation: ring 1s ease-in-out infinite; }
  </style>
  <rect width="640" height="180" fill="#0a0a1a"/>
  <!-- 3AM clock -->
  <rect x="40" y="20" width="80" height="44" fill="#1e293b" rx="4"/>
  <text x="80" y="50" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" class="alarm">3:00</text>
  <text x="80" y="16" text-anchor="middle" font-family="monospace" font-size="8" fill="#ef4444">AM</text>
  <!-- Pager/Phone ringing -->
  <g class="shake">
    <rect x="160" y="30" width="32" height="48" fill="#374151" rx="4"/>
    <rect x="164" y="36" width="24" height="28" fill="#ef4444" opacity="0.3"/>
    <text x="176" y="54" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">🔔</text>
    <!-- Ring waves -->
    <rect x="196" y="38" width="8" height="4" fill="#ef4444" class="ring"/>
    <rect x="200" y="30" width="8" height="4" fill="#ef4444" class="ring" style="animation-delay:0.3s"/>
    <rect x="204" y="22" width="8" height="4" fill="#ef4444" class="ring" style="animation-delay:0.6s"/>
  </g>
  <!-- Sleepy person in bed -->
  <rect x="40" y="90" width="100" height="40" fill="#1e293b" rx="4"/><!-- Bed -->
  <rect x="40" y="80" width="24" height="20" fill="#fbbf24" rx="2"/><!-- Head on pillow -->
  <rect x="44" y="88" width="4" height="2" fill="#0a0a1a"/>
  <rect x="52" y="88" width="4" height="2" fill="#0a0a1a"/>
  <rect x="36" y="130" width="108" height="8" fill="#78350f"/><!-- Bed frame -->
  <!-- Old runbook with red X -->
  <rect x="260" y="30" width="120" height="100" fill="#1e293b" rx="4"/>
  <text x="320" y="52" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">RUNBOOK v2.1</text>
  <text x="320" y="64" text-anchor="middle" font-family="monospace" font-size="7" fill="#ef4444">Last updated: 6 months ago</text>
  <rect x="272" y="72" width="60" height="4" fill="#374151"/>
  <rect x="272" y="80" width="48" height="4" fill="#374151"/>
  <rect x="272" y="88" width="72" height="4" fill="#374151"/>
  <rect x="272" y="96" width="36" height="4" fill="#374151"/>
  <rect x="272" y="104" width="56" height="4" fill="#374151"/>
  <!-- Big red X -->
  <line x1="280" y1="40" x2="360" y2="120" stroke="#ef4444" stroke-width="6" opacity="0.4"/>
  <line x1="360" y1="40" x2="280" y2="120" stroke="#ef4444" stroke-width="6" opacity="0.4"/>
  <text x="320" y="148" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">⚠ OUTDATED • COMMANDS BROKEN</text>
  <!-- Frustrated engineer at computer -->
  <rect x="460" y="50" width="20" height="20" fill="#fbbf24" rx="2"/>
  <rect x="464" y="58" width="4" height="4" fill="#0a0a1a"/>
  <rect x="472" y="58" width="4" height="4" fill="#0a0a1a"/>
  <rect x="466" y="66" width="8" height="3" fill="#ef4444"/>
  <rect x="456" y="72" width="28" height="28" fill="#3b82f6"/>
  <!-- Question marks floating -->
  <text x="500" y="48" font-family="monospace" font-size="16" fill="#f97316" class="ring">?</text>
  <text x="516" y="60" font-family="monospace" font-size="12" fill="#ef4444" class="ring" style="animation-delay:0.5s">?</text>
  <text x="444" y="44" font-family="monospace" font-size="14" fill="#fbbf24" class="ring" style="animation-delay:1s">?</text>
  <!-- Monitor with error -->
  <rect x="520" y="60" width="60" height="40" fill="#1e293b" rx="2"/>
  <rect x="524" y="64" width="52" height="32" fill="#0f172a"/>
  <rect x="528" y="68" width="24" height="3" fill="#ef4444" opacity="0.8"/>
  <rect x="528" y="74" width="36" height="3" fill="#ef4444" opacity="0.6"/>
  <rect x="528" y="80" width="18" height="3" fill="#ef4444" opacity="0.8"/>
  <rect x="528" y="86" width="44" height="3" fill="#ef4444" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="164" width="640" height="4" fill="#374151" opacity="0.3"/>
</svg>