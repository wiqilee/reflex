<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes scan { 0%{transform:translateY(0)} 50%{transform:translateY(4px)} 100%{transform:translateY(0)} }
      @keyframes glow { 0%,100%{filter:drop-shadow(0 0 2px #f97316)} 50%{filter:drop-shadow(0 0 8px #f97316)} }
      @keyframes slideIn { 0%{opacity:0;transform:translateX(-8px)} 100%{opacity:1;transform:translateX(0)} }
      @keyframes typewriter { 0%{width:0} 100%{width:100%} }
      .pixel { image-rendering: pixelated; }
      .blink { animation: blink 1.5s ease-in-out infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .scan { animation: scan 2s ease-in-out infinite; }
      .glow { animation: glow 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="8" fill="#0a0a12"/>
  <rect x="1" y="1" width="478" height="118" rx="7" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Monitor/Terminal pixel art -->
  <g transform="translate(16, 16)">
    <!-- Monitor frame -->
    <rect x="0" y="0" width="56" height="44" rx="3" fill="#1a1d27" stroke="#334155" stroke-width="1.5"/>
    <rect x="3" y="3" width="50" height="34" rx="1" fill="#0f172a"/>
    <!-- Screen content - code lines -->
    <rect x="6" y="7" width="20" height="2" rx="1" fill="#f97316" opacity="0.8"/>
    <rect x="6" y="12" width="30" height="2" rx="1" fill="#64748b" opacity="0.5"/>
    <rect x="6" y="17" width="15" height="2" rx="1" fill="#ef4444" class="blink"/>
    <rect x="6" y="22" width="25" height="2" rx="1" fill="#64748b" opacity="0.5"/>
    <rect x="6" y="27" width="18" height="2" rx="1" fill="#22c55e" class="pulse"/>
    <!-- Monitor stand -->
    <rect x="22" y="44" width="12" height="6" fill="#334155"/>
    <rect x="16" y="50" width="24" height="3" rx="1" fill="#334155"/>
    <!-- Scan line -->
    <rect x="3" y="6" width="50" height="1" fill="#f97316" opacity="0.15" class="scan"/>
  </g>

  <!-- Lightning bolt -->
  <g transform="translate(84, 24)" class="glow">
    <polygon points="12,0 4,18 10,18 6,32 20,12 13,12 18,0" fill="#f97316"/>
  </g>

  <!-- Arrow flow -->
  <g transform="translate(108, 38)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="24,-3 30,0 24,3" fill="#f97316" opacity="0.8"/>
  </g>

  <!-- REFLEX brain/engine -->
  <g transform="translate(142, 14)">
    <rect width="80" height="52" rx="6" fill="#1a1d27" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
    <!-- Gear/circuit lines -->
    <circle cx="40" cy="20" r="10" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6" class="pulse"/>
    <circle cx="40" cy="20" r="4" fill="#f97316" opacity="0.4"/>
    <text x="40" y="23" text-anchor="middle" font-size="8" fill="#f97316" font-family="monospace" font-weight="bold">AI</text>
    <text x="40" y="44" text-anchor="middle" font-size="7" fill="#94a3b8" font-family="monospace">REFLEX</text>
    <!-- Processing dots -->
    <circle cx="16" cy="20" r="2" fill="#2dd4bf" class="blink" style="animation-delay:0s"/>
    <circle cx="64" cy="20" r="2" fill="#2dd4bf" class="blink" style="animation-delay:0.5s"/>
  </g>

  <!-- Arrow flow out -->
  <g transform="translate(226, 38)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="4 3" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="0" to="-14" dur="1s" repeatCount="indefinite"/>
    </line>
    <polygon points="24,-3 30,0 24,3" fill="#2dd4bf" opacity="0.8"/>
  </g>

  <!-- Runbook output -->
  <g transform="translate(260, 10)">
    <!-- Document -->
    <rect width="52" height="60" rx="3" fill="#1a1d27" stroke="#2dd4bf" stroke-width="1.5"/>
    <!-- Header -->
    <rect x="4" y="4" width="28" height="3" rx="1" fill="#2dd4bf" opacity="0.7"/>
    <!-- Phases -->
    <rect x="4" y="11" width="44" height="2" rx="1" fill="#ef4444" opacity="0.5"/>
    <text x="6" y="12.5" font-size="3.5" fill="#ef4444" font-family="monospace" opacity="0.8">DETECT</text>
    <rect x="4" y="16" width="44" height="2" rx="1" fill="#f97316" opacity="0.5"/>
    <text x="6" y="17.5" font-size="3.5" fill="#f97316" font-family="monospace" opacity="0.8">DIAGNOSE</text>
    <rect x="4" y="21" width="44" height="2" rx="1" fill="#eab308" opacity="0.5"/>
    <text x="6" y="22.5" font-size="3.5" fill="#eab308" font-family="monospace" opacity="0.8">FIX</text>
    <rect x="4" y="26" width="44" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>
    <text x="6" y="27.5" font-size="3.5" fill="#3b82f6" font-family="monospace" opacity="0.8">ROLLBACK</text>
    <rect x="4" y="31" width="44" height="2" rx="1" fill="#22c55e" opacity="0.5"/>
    <text x="6" y="32.5" font-size="3.5" fill="#22c55e" font-family="monospace" opacity="0.8">PREVENT</text>
    <!-- Checkmarks -->
    <text x="44" y="13" font-size="5" fill="#22c55e" class="blink" style="animation-delay:0s">✓</text>
    <text x="44" y="18" font-size="5" fill="#22c55e" class="blink" style="animation-delay:0.3s">✓</text>
    <text x="44" y="23" font-size="5" fill="#22c55e" class="blink" style="animation-delay:0.6s">✓</text>
    <text x="44" y="28" font-size="5" fill="#22c55e" class="blink" style="animation-delay:0.9s">✓</text>
    <text x="44" y="33" font-size="5" fill="#22c55e" class="blink" style="animation-delay:1.2s">✓</text>
    <!-- L1/L2/L3 badges -->
    <rect x="4" y="38" width="12" height="7" rx="2" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="0.5"/>
    <text x="10" y="43" text-anchor="middle" font-size="4" fill="#22c55e" font-family="monospace">L1</text>
    <rect x="19" y="38" width="12" height="7" rx="2" fill="#eab308" opacity="0.2" stroke="#eab308" stroke-width="0.5"/>
    <text x="25" y="43" text-anchor="middle" font-size="4" fill="#eab308" font-family="monospace">L2</text>
    <rect x="34" y="38" width="12" height="7" rx="2" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="0.5"/>
    <text x="40" y="43" text-anchor="middle" font-size="4" fill="#ef4444" font-family="monospace">L3</text>
    <!-- Severity bar -->
    <g transform="translate(4, 50)">
      <rect width="12" height="4" rx="1" fill="#ef4444"/>
      <rect x="12" width="10" height="4" rx="1" fill="#f97316"/>
      <rect x="22" width="12" height="4" rx="1" fill="#eab308"/>
      <rect x="34" width="10" height="4" rx="1" fill="#22c55e"/>
    </g>
  </g>

  <!-- Graph nodes (dependency viz) -->
  <g transform="translate(326, 14)">
    <!-- Central node -->
    <circle cx="30" cy="26" r="8" fill="#1a1d27" stroke="#8b5cf6" stroke-width="1.5" class="pulse"/>
    <text x="30" y="28" text-anchor="middle" font-size="5" fill="#8b5cf6" font-family="monospace">API</text>
    <!-- Satellite nodes -->
    <circle cx="8" cy="10" r="6" fill="#1a1d27" stroke="#ef4444" stroke-width="1"/>
    <text x="8" y="12" text-anchor="middle" font-size="4" fill="#ef4444" font-family="monospace">DB</text>
    <circle cx="52" cy="10" r="6" fill="#1a1d27" stroke="#2dd4bf" stroke-width="1"/>
    <text x="52" y="12" text-anchor="middle" font-size="3.5" fill="#2dd4bf" font-family="monospace">Cache</text>
    <circle cx="8" cy="44" r="6" fill="#1a1d27" stroke="#f97316" stroke-width="1"/>
    <text x="8" y="46" text-anchor="middle" font-size="3.5" fill="#f97316" font-family="monospace">Auth</text>
    <circle cx="52" cy="44" r="6" fill="#1a1d27" stroke="#22c55e" stroke-width="1"/>
    <text x="52" y="46" text-anchor="middle" font-size="3.5" fill="#22c55e" font-family="monospace">MQ</text>
    <!-- Edges -->
    <line x1="14" y1="14" x2="23" y2="21" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
    <line x1="46" y1="14" x2="37" y2="21" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
    <line x1="14" y1="40" x2="23" y2="31" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
    <line x1="46" y1="40" x2="37" y2="31" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
    <!-- Blast pulse -->
    <circle cx="30" cy="26" r="14" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.3">
      <animate attributeName="r" values="14;22;14" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Rust WASM badge -->
  <g transform="translate(398, 16)">
    <rect width="68" height="18" rx="4" fill="#1a1d27" stroke="#DEA584" stroke-width="1"/>
    <text x="34" y="12" text-anchor="middle" font-size="6" fill="#DEA584" font-family="monospace" font-weight="bold">🦀 Rust WASM</text>
  </g>

  <!-- Agent Triage badge -->
  <g transform="translate(398, 40)">
    <rect width="68" height="18" rx="4" fill="#1a1d27" stroke="#2dd4bf" stroke-width="1"/>
    <text x="34" y="12" text-anchor="middle" font-size="6" fill="#2dd4bf" font-family="monospace" font-weight="bold">🤖 Agent</text>
  </g>

  <!-- Bottom status bar -->
  <g transform="translate(16, 86)">
    <rect width="448" height="22" rx="4" fill="#1a1d27" stroke="#1e293b" stroke-width="1"/>
    <!-- Status items -->
    <circle cx="12" cy="11" r="3" fill="#22c55e" class="pulse"/>
    <text x="20" y="14" font-size="7" fill="#64748b" font-family="monospace">21 features</text>
    <text x="100" y="14" font-size="7" fill="#64748b" font-family="monospace">·</text>
    <text x="112" y="14" font-size="7" fill="#f97316" font-family="monospace">Mistral Large 3</text>
    <text x="210" y="14" font-size="7" fill="#64748b" font-family="monospace">·</text>
    <text x="222" y="14" font-size="7" fill="#DEA584" font-family="monospace">Rust WASM</text>
    <text x="295" y="14" font-size="7" fill="#64748b" font-family="monospace">·</text>
    <text x="307" y="14" font-size="7" fill="#2dd4bf" font-family="monospace">Agent Triage</text>
    <text x="395" y="14" font-size="7" fill="#64748b" font-family="monospace">·</text>
    <text x="407" y="14" font-size="7" fill="#3b82f6" font-family="monospace">18 langs</text>
  </g>
</svg>
