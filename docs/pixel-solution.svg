<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 48" width="480" height="48">
  <defs>
    <style>
      @keyframes pulse2 { 0%,100%{opacity:0.5} 50%{opacity:1} }
      @keyframes flow { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-14} }
    </style>
  </defs>
  <rect width="480" height="48" rx="6" fill="#0a0a12"/>
  <rect x="1" y="1" width="478" height="46" rx="5" fill="none" stroke="#1e293b" stroke-width="1"/>
  <!-- Code input -->
  <g transform="translate(16, 8)">
    <rect width="56" height="32" rx="3" fill="#1a1d27" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="6" y="14" font-size="5" fill="#3b82f6" font-family="monospace">def pay():</text>
    <text x="6" y="21" font-size="5" fill="#64748b" font-family="monospace">  db.query(</text>
    <text x="6" y="28" font-size="5" fill="#ef4444" font-family="monospace">  f"SELECT</text>
  </g>
  <!-- Arrow with flow -->
  <g transform="translate(80, 22)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#f97316" stroke-width="2" stroke-dasharray="4 3" style="animation:flow 1s linear infinite"/>
    <polygon points="20,-3 26,0 20,3" fill="#f97316"/>
  </g>
  <!-- REFLEX engine -->
  <g transform="translate(112, 6)">
    <rect width="60" height="36" rx="5" fill="#1a1d27" stroke="#f97316" stroke-width="1.5"/>
    <text x="30" y="18" text-anchor="middle" font-size="7" fill="#f97316" font-family="monospace" font-weight="bold">⚡ REFLEX</text>
    <text x="30" y="30" text-anchor="middle" font-size="5" fill="#64748b" font-family="monospace">Mistral AI</text>
  </g>
  <!-- Arrow out -->
  <g transform="translate(180, 22)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="4 3" style="animation:flow 1s linear infinite"/>
    <polygon points="20,-3 26,0 20,3" fill="#2dd4bf"/>
  </g>
  <!-- 5-phase runbook -->
  <g transform="translate(212, 6)">
    <rect width="80" height="36" rx="3" fill="#1a1d27" stroke="#2dd4bf" stroke-width="1.5"/>
    <rect x="4" y="5" width="72" height="4" rx="1" fill="#ef4444" opacity="0.4"/><text x="6" y="9" font-size="4" fill="#ef4444" font-family="monospace">DETECT</text>
    <rect x="4" y="11" width="72" height="4" rx="1" fill="#f97316" opacity="0.4"/><text x="6" y="15" font-size="4" fill="#f97316" font-family="monospace">DIAGNOSE</text>
    <rect x="4" y="17" width="72" height="4" rx="1" fill="#eab308" opacity="0.4"/><text x="6" y="21" font-size="4" fill="#eab308" font-family="monospace">FIX</text>
    <rect x="4" y="23" width="72" height="4" rx="1" fill="#3b82f6" opacity="0.4"/><text x="6" y="27" font-size="4" fill="#3b82f6" font-family="monospace">ROLLBACK</text>
    <rect x="4" y="29" width="72" height="4" rx="1" fill="#22c55e" opacity="0.4"/><text x="6" y="33" font-size="4" fill="#22c55e" font-family="monospace">PREVENT</text>
  </g>
  <!-- Result -->
  <g transform="translate(308, 8)">
    <rect width="64" height="32" rx="3" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="1"/>
    <text x="32" y="16" text-anchor="middle" font-size="6" fill="#22c55e" font-family="monospace" font-weight="bold">~15 sec</text>
    <text x="32" y="28" text-anchor="middle" font-size="6" fill="#22c55e" font-family="monospace" opacity="0.7">8 runbooks</text>
  </g>
  <!-- Sleep well -->
  <g transform="translate(390, 8)">
    <text x="16" y="22" text-anchor="middle" font-size="14">😴</text>
    <text x="42" y="18" font-size="6" fill="#22c55e" font-family="monospace">On-call</text>
    <text x="42" y="28" font-size="6" fill="#22c55e" font-family="monospace" font-weight="bold">sleeps ✓</text>
  </g>
</svg>
