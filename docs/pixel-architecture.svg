<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 48" width="480" height="48">
  <defs><style>@keyframes dataflow { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-14} }</style></defs>
  <rect width="480" height="48" rx="6" fill="#0a0a12"/>
  <rect x="1" y="1" width="478" height="46" rx="5" fill="none" stroke="#1e293b" stroke-width="1"/>
  <!-- Browser -->
  <g transform="translate(12, 6)">
    <rect width="80" height="36" rx="4" fill="#1a1d27" stroke="#3178C6" stroke-width="1.5"/>
    <text x="40" y="14" text-anchor="middle" font-size="6" fill="#3178C6" font-family="monospace" font-weight="bold">React + TS</text>
    <text x="40" y="24" text-anchor="middle" font-size="5" fill="#DEA584" font-family="monospace">Rust WASM</text>
    <text x="40" y="34" text-anchor="middle" font-size="5" fill="#64748b" font-family="monospace">Tailwind</text>
  </g>
  <!-- Arrow -->
  <line x1="96" y1="24" x2="132" y2="24" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" style="animation:dataflow 1s linear infinite"/>
  <polygon points="132,21 138,24 132,27" fill="#f97316"/>
  <!-- FastAPI -->
  <g transform="translate(142, 6)">
    <rect width="80" height="36" rx="4" fill="#1a1d27" stroke="#3776AB" stroke-width="1.5"/>
    <text x="40" y="14" text-anchor="middle" font-size="6" fill="#3776AB" font-family="monospace" font-weight="bold">FastAPI</text>
    <text x="40" y="24" text-anchor="middle" font-size="5" fill="#64748b" font-family="monospace">Pydantic</text>
    <text x="40" y="34" text-anchor="middle" font-size="5" fill="#64748b" font-family="monospace">Async</text>
  </g>
  <!-- Arrow -->
  <line x1="226" y1="24" x2="262" y2="24" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4 3" style="animation:dataflow 1s linear infinite"/>
  <polygon points="262,21 268,24 262,27" fill="#f97316"/>
  <!-- Mistral -->
  <g transform="translate(272, 6)">
    <rect width="100" height="36" rx="4" fill="#1a1d27" stroke="#f97316" stroke-width="1.5"/>
    <text x="50" y="14" text-anchor="middle" font-size="6" fill="#f97316" font-family="monospace" font-weight="bold">Mistral Large 3</text>
    <text x="50" y="24" text-anchor="middle" font-size="5" fill="#f97316" font-family="monospace" opacity="0.7">Function Calling</text>
    <text x="50" y="34" text-anchor="middle" font-size="5" fill="#64748b" font-family="monospace">3 typed tools</text>
  </g>
  <!-- CI badge -->
  <g transform="translate(390, 6)">
    <rect width="76" height="36" rx="4" fill="#1a1d27" stroke="#22c55e" stroke-width="1"/>
    <text x="38" y="14" text-anchor="middle" font-size="6" fill="#22c55e" font-family="monospace" font-weight="bold">CI/CD</text>
    <text x="38" y="24" text-anchor="middle" font-size="5" fill="#64748b" font-family="monospace">pytest</text>
    <text x="38" y="34" text-anchor="middle" font-size="5" fill="#64748b" font-family="monospace">GitHub Actions</text>
  </g>
</svg>
